name: Release

on:
  push:
    branches:
      - main
    paths:
      - VERSION
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Package and publish release
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Read version metadata
        id: version
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          build_number="$(tr -d '[:space:]' < BUILD_NUMBER)"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must use semantic version format major.minor.patch" >&2
            exit 1
          fi
          if [[ ! "$build_number" =~ ^[0-9]+$ ]]; then
            echo "BUILD_NUMBER must be an integer" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Validate release tag
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            tag_commit="$(git rev-list -n 1 "$tag")"
            if [[ "$tag_commit" != "$GITHUB_SHA" ]]; then
              echo "Tag $tag already exists at $tag_commit, not this release commit $GITHUB_SHA." >&2
              echo "Bump VERSION to publish a new release instead of moving an existing tag." >&2
              exit 1
            fi
          fi

      - name: Run tests
        run: swift test

      - name: Build universal DMG
        run: ./scripts/create_dmg.sh

      - name: Generate release notes
        id: notes
        run: |
          tag="${{ steps.version.outputs.tag }}"
          previous_tag="$(git tag --list 'v*' --sort=-v:refname | grep -v "^$tag$" | head -n 1 || true)"
          notes_file="$RUNNER_TEMP/release-notes.md"
          {
            echo "Ready Room ${{ steps.version.outputs.version }} (${{ steps.version.outputs.build_number }})"
            echo
            if [[ -n "$previous_tag" ]]; then
              echo "Changes since $previous_tag:"
              git log --format='- %s' "$previous_tag..HEAD" | grep -v -E '^- (build|chore): (bump|record|set) Ready Room|^- Bump version' || true
            else
              echo "First public Ready Room release generated from the current main branch."
              echo
              echo "Recent changes:"
              git log --format='- %s' --max-count=20
            fi
            echo
            echo "Distribution note: this macOS app is ad-hoc signed, not Developer ID signed or notarized. macOS may still require approving it in System Settings > Privacy & Security."
          } > "$notes_file"
          echo "notes_file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create tag if needed
        run: |
          tag="${{ steps.version.outputs.tag }}"
          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            git tag "$tag" "$GITHUB_SHA"
            git push origin "$tag"
          fi

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          dmg_path="$(find dist -maxdepth 1 -name 'Ready-Room-v*-*-universal.dmg' -print -quit)"
          if [[ -z "$dmg_path" ]]; then
            echo "No DMG was produced." >&2
            exit 1
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "Ready Room ${{ steps.version.outputs.version }}" \
              --notes-file "${{ steps.notes.outputs.notes_file }}"
          else
            gh release create "$tag" \
              --title "Ready Room ${{ steps.version.outputs.version }}" \
              --notes-file "${{ steps.notes.outputs.notes_file }}"
          fi
          gh release upload "$tag" "$dmg_path" --clobber
