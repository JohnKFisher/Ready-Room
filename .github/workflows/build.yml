name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Test and package
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Run tests
        run: swift test

      - name: Build universal DMG
        run: ./scripts/create_dmg.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v7
        with:
          name: ready-room-universal-dmg
          path: dist/Ready-Room-v*-*-universal.dmg
          if-no-files-found: error
          retention-days: 30
